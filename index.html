<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricZone Hub</title>
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .hero-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; }
        th, td { padding: 10px; border: 1px solid #444; text-align: center; }
        .live-badge { color: #ff4d4d; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .footer-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 30px; }
        .box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-card">
            <h1>CricZone Hub</h1>
            <p>Abhi ye match ID active nahi hai: 123456</p>
            <div class="live-badge">● LIVE STATUS: MATCH INACTIVE</div>
        </div>

        <div class="stats-grid">
            <div class="box">
                <h3>Top Score</h3>
                <table>
                    <tr><th>Player</th><th>Runs</th></tr>
                    <tr><td>E. Perry</td><td>113*</td></tr>
                    <tr><td>S. Mandhana</td><td>98</td></tr>
                </table>
            </div>
            <div class="box">
                <h3>Most Wickets</h3>
                <table>
                    <tr><th>Player</th><th>Wkts</th></tr>
                    <tr><td>A. King</td><td>15</td></tr>
                    <tr><td>D. Vaidya</td><td>13</td></tr>
                </table>
            </div>
        </div>

        <div class="footer-grid">
            <div class="box"><h3>Videos</h3><p>Top Catch Highlights...</p></div>
            <div class="box"><h3>Social Links</h3><p>YT | Insta | Twitter</p></div>
        </div>
    </div>
</body>
</html>
