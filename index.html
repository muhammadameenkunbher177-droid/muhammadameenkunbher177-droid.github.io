<!DOCTYPE html>
<html>
<body style="background-color: #1a1a1a; color: white; padding: 20px;">

    <h1>CricZone Hub</h1>
    
    <div id="score-display">Loading...</div>

    <script>
        const url = 'https://flashlive-sports.p.rapidapi.com/v1/events/player-statistics-alt?locale=en_INT&event_id=fXx7UfRk';
        const options = {
            method: 'GET',
            headers: {
                'x-rapidapi-host': 'flashlive-sports.p.rapidapi.com',
                'x-rapidapi-key': '231f3d8023mshbb446d916dea655p174f77jsn9570852ce6a0'
            }
        };

        async function fetchScore() {
            try {
                const response = await fetch(url, options);
                const result = await response.json();
                
                // Yeh line result ko us dabbe (div) ke andar daal degi
                document.getElementById('score-display').innerText = JSON.stringify(result);
            } catch (error) {
                document.getElementById('score-display').innerText = "Error aa gaya!";
            }
        }

        // Har 30 second baad update karega
        setInterval(fetchScore, 30000);
        fetchScore(); // Pehli baar jaldi load karne ke liye
    </script>
</body>
</html>
