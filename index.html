<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricZone Hub | Live</title>
    <style>
        body { background-color: #0d0d0d; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        /* Logo Styling */
        .logo-box { text-align: center; margin-bottom: 10px; }
        .logo-circle { width: 80px; height: 80px; background: linear-gradient(45deg, #00d2ff, #3a7bd5); 
                       border-radius: 50%; display: flex; align-items: center; justify-content: center; 
                       margin: 0 auto 15px; font-weight: bold; font-size: 24px; color: white; border: 4px solid #fff; }

        .hero-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 30px; 
                     border-radius: 20px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .box { background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; border-bottom: 1px solid #333; text-align: center; }
        
        .live-badge { color: #ff4d4d; font-weight: bold; animation: blink 1s infinite; margin-top: 10px; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-card">
            <div class="logo-box">
                <div class="logo-circle">CZ</div>
            </div>
            <h1>CricZone Hub</h1>
            <p>Abhi ye match ID active nahi hai: 123456</p>
            <div class="live-badge">● LIVE STATUS: MATCH INACTIVE</div>
        </div>

        <div class="stats-grid">
            <div class="box">
                <h3>Top Score</h3>
                <table>
                    <tr><th>Player</th><th>Runs</th></tr>
                    <tr><td>E. Perry</td><td>113*</td></tr>
                    <tr><td>S. Mandhana</td><td>98</td></tr>
                </table>
            </div>
            <div class="box">
                <h3>Most Wickets</h3>
                <table>
                    <tr><th>Player</th><th>Wkts</th></tr>
                    <tr><td>A. King</td><td>15</td></tr>
                    <tr><td>D. Vaidya</td><td>13</td></tr>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
