<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricZone Hub</title>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: 'Arial', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        
        /* Logo Styling - Represents the premium shield design */
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-box { background: linear-gradient(135deg, #b8860b, #daa520); padding: 15px; border-radius: 15px; 
                    display: inline-block; font-weight: bold; font-size: 28px; color: #000; 
                    box-shadow: 0 4px 15px rgba(218, 165, 32, 0.4); border: 2px solid #fff; }
        
        .hero-card { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .box { background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 15px; border: 1px solid #222; }
        
        .live-badge { color: #ff4d4d; font-weight: bold; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-card">
            <div class="logo-container">
                <div class="logo-box">CRICZONE HUB</div>
            </div>
            <p>Abhi ye match ID active nahi hai: 123456</p>
            <div class="live-badge">● LIVE STATUS: MATCH INACTIVE</div>
        </div>

        <div class="stats-grid">
            <div class="box">
                <h3>Top Score</h3>
                <p>E. Perry: 113*</p>
            </div>
            <div class="box">
                <h3>Most Wickets</h3>
                <p>A. King: 15</p>
            </div>
        </div>
    </div>
</body>
</html>
