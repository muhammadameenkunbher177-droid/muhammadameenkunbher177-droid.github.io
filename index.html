<!DOCTYPE html>
<html>
<head>
    <title>CricZone Live Portal</title>
    <style>
        body { background-color: #000; color: white; text-align: center; font-family: sans-serif; padding: 10px; margin: 0; }
        .stream-box { width: 100%; max-width: 900px; margin: 20px auto; border: 4px solid #ff0000; border-radius: 15px; overflow: hidden; }
        .live-badge { background-color: #ff0000; color: white; padding: 10px; font-weight: bold; display: inline-block; border-radius: 5px; margin-bottom: 10px; }
        iframe { width: 100%; height: 500px; }
        .info { margin-top: 20px; color: #ccc; }
    </style>
</head>
<body>

    <h1>CricZone Live Portal</h1>
    <div class="live-badge">🔴 NOW LIVE: Pakistan Women's Match</div>

    <div class="stream-box">
        <!-- Yahan aapka YouTube Live Embed Link aayega -->
        <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" frameborder="0" allowfullscreen></iframe>
    </div>

    <div class="info">
        <p>Agar stream nahi chal rahi, toh page refresh karein.</p>
    </div>

</body>
</html>
