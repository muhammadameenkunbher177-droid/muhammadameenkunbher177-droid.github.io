<!DOCTYPE html>
<html>
<head>
<style>
    body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
    .container { display: flex; justify-content: center; gap: 20px; padding: 20px; align-items: flex-start; }
    
    /* Sides */
    .side-box { background: #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; width: 220px; }
    .side-box img { width: 80px; height: 80px; border-radius: 50%; display: block; margin: 5px auto; }
    
    /* Middle */
    .middle-box { width: 500px; text-align: center; }
    .header-elements { width: 100%; height: 150px; background: #333; margin-bottom: 20px; border-radius: 10px; display: flex; justify-content: center; align-items: center; } /* Yahan apni cricket image lagayein */
    .stats-card { background: #1a1a1a; border: 2px solid #ff4500; padding: 20px; border-radius: 15px; }
</style>
</head>
<body>

<div class="container">
    <div class="side-box">
        <h3>WEST SIDE RIVALRY</h3>
        <img src="babar.jpg" alt="Babar"> <p>Babar Azam</p>
        <img src="rizwan.jpg" alt="Rizwan"> <p>Mohammad Rizwan</p>
    </div>

    <div class="middle-box">
        <div class="header-elements">
            <img src="cricket_elements.png" alt="Bat Ball Wicket" style="max-width: 100%; height: auto;">
        </div>
        <div class="stats-card">
            <h2>Historic Head-to-Head Stats</h2>
            <p>PAKISTAN vs. INDIA: Total 212 | Pak 88 | India 81 | Draws 43</p>
            <p>PAKISTAN vs. AUSTRALIA: Total 217 | Pak 68 | Aus 123 | Draws 26</p>
        </div>
    </div>

    <div class="side-box">
        <h3>EAST SIDE RIVALRY</h3>
        <img src="kohli.jpg" alt="Kohli"> <p>Virat Kohli</p>
        <img src="rohit.jpg" alt="Rohit"> <p>Rohit Sharma</p>
    </div>
</div>

</body>
</html>
