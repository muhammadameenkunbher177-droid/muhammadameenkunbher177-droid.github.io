<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricZone Hub</title>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        /* Top Section */
        .hero-card { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; margin-bottom: 20px; }
        .logo-box { padding: 15px; background: #daa520; color: black; font-weight: bold; border-radius: 10px; display: inline-block; }
        .live-badge { color: #ff4d4d; font-weight: bold; margin-top: 10px; }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .box { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #444; text-align: center; }

        /* Video Section */
        .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .video-item { background: #1a1a1a; padding: 5px; border-radius: 8px; }
        iframe { width: 100%; height: 150px; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <div class="hero-card">
            <div class="logo-box">CRICZONE HUB</div>
            <p>Abhi ye match ID active nahi hai: 123456</p>
            <div class="live-badge">● LIVE STATUS: MATCH INACTIVE</div>
        </div>

        <!-- Stats Section -->
        <div class="stats-grid">
            <div class="box">
                <h3>Top Score (T20 WC)</h3>
                <table><tr><th>Player</th><th>Runs</th></tr><tr><td>E. Perry</td><td>113*</td></tr></table>
            </div>
            <div class="box">
                <h3>Most Wickets (T20 WC)</h3>
                <table><tr><th>Player</th><th>Wkts</th></tr><tr><td>A. King</td><td>15</td></tr></table>
            </div>
        </div>

        <!-- Videos Section -->
        <h2>Latest Cricket Videos</h2>
        <div class="video-grid">
            <div class="video-item"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>
            <div class="video-item"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>
            <div class="video-item"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>
            <div class="video-item"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>
            <div class="video-item"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>
            <div class="video-item"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>
            <div class="video-item"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>
            <div class="video-item"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>
            <div class="video-item"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>
            <div class="video-item"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>
            <div class="video-item"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>
            <div class="video-item"><iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID"></iframe></div>
        </div>
    </div>
</body>
</html>
