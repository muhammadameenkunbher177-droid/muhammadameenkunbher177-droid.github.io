<div id="score-box" style="background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #00ffcc; color: white; text-align: center;">
    <h3>Live Score</h3>
    <div id="live-score-text">Data load ho raha hai...</div>
</div>

<script>
    // Yeh free API hai
    fetch('https://api.cuvora.com/carrom/frontside/get-cricket-score-card?matchId=latest')
        .then(response => response.json())
        .then(data => {
            document.getElementById('live-score-text').innerHTML = data.data.score;
        })
        .catch(err => {
            document.getElementById('live-score-text').innerHTML = "Abhi koi live match nahi chal raha.";
        });
</script>
